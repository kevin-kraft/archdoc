project:
  name: utilis
  root: ..
  source_root: api/app

scan:
  include:
    - "**/*.py"
  exclude:
    - "**/__pycache__/**"
    - "**/.venv/**"
    - "**/venv/**"
    - "**/migrations/**"
    - "**/tests/**"

output:
  raw_facts: archdoc/docs/architecture/generated_raw/raw_code_facts.json
  catalog_dir: archdoc/docs/architecture/catalog/generated
  docusaurus_static_dir: archdoc/site/static/archdoc
  overlays_dir: archdoc/docs/architecture/overlays
  schema_dir: archdoc/docs/architecture/schemas