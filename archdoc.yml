project:
  name: utilis
  root: ..
  source_root: api/app

scan:
  include:
    - "**/*.py"
  exclude:
    - "**/__pycache__/**"
    - "**/.venv/**"
    - "**/venv/**"
    - "**/migrations/**"
    - "**/tests/**"

output:
  raw_facts: docs-site-docasaurus/docs/architecture/generated_raw/raw_code_facts.json
  catalog_dir: ../docs/architecture/catalog/generated
  docusaurus_static_dir: docs-site-docasaurus/site/static/archdoc
  overlays_dir: docs-site-docasaurus/docs/architecture/overlays
  schema_dir: docs-site-docasaurus/docs/architecture/schemas

mapping:
  services:
    paths:
      - services
      - app/services
    class_suffixes:
      - Service
    exclude_classes:
      - AuditService
    public_methods_as_operations: true
    ignore_method_prefixes:
      - "_"
    ignore_methods:
      - "__init__"
      - validate_permissions
      - check_organization_permission
      - handle_db_error
      - get_db_session
      - commit
      - rollback
  endpoints:
    paths:
      - routers
      - app/routers
    route_signal_kind: api_route
  actions:
    enabled: true
    include_unmatched_type_usages: true
    patterns:
      - name: database_session_call
        kind: database_action
        call_roles:
          - db_call
        confidence: high
      - name: permission_dependency
        kind: permission_action
        action: check
        call_names:
          - require_permission
          - require_any_permission
          - has_permission
        call_contains:
          - require_permission
          - require_any_permission
          - has_permission
        include_nested_calls: true
        confidence: high
      - name: org_context_dependency
        kind: permission_action
        action: tenant_context
        call_names:
          - require_org_context
        call_contains:
          - require_org_context
        include_nested_calls: true
        confidence: high
      - name: audit_event
        kind: audit_action
        action: log
        call_suffixes:
          - .log_event
        call_contains:
          - AuditService
        confidence: high
      - name: worker_dispatch
        kind: worker_action
        action: dispatch
        call_suffixes:
          - .delay
          - .apply_async
          - .enqueue
          - .send_task
        confidence: medium
      - name: external_http
        kind: external_action
        action: request
        call_contains:
          - httpx
          - requests.
          - resilient_httpx_request
        confidence: medium
  entities:
    enabled: true
    paths:
      - models
      - app/models
    class_base_names:
      - Base
      - DeclarativeBase
    field_value_calls:
      - Column
      - mapped_column
      - relationship
    table_name_fields:
      - __tablename__
    include_pydantic_models: true
  workers:
    enabled: true
    worker_classes:
      - Worker
    dispatch_calls:
      - name: enqueue_job
        job_type_arg: job_type
        payload_arg: payload
        schedule_arg: run_at
        priority_arg: priority
        org_arg: org_id
    job_model_constructors:
      - class_name: Job
        job_type_kwarg: job_type
        payload_kwarg: payload
        schedule_kwarg: scheduled_at
        priority_kwarg: priority
        org_kwarg: org_id
    queue_method_suffixes:
      - .delay
      - .apply_async
      - .enqueue
      - .send_task
    injected_attribute_names:
      - worker

naming:
  service_id_template: "{domain}.{class_slug}"
  operation_id_template: "{service_id}.operation.{method_name}"
