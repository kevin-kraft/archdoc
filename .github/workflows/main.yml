name: Deploy Teamprojekt Doc

on:
  push:
    branches:
      - master

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install frontend dependencies
        working-directory: site
        run: npm ci

      - name: Typecheck frontend
        working-directory: site
        run: npm run typecheck

  deploy:
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy project to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          source: "."
          target: "/var/www/html/teamprojekt-docs"
          rm: true

      - name: Build and restart Docker stack
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e

            cd /var/www/html/teamprojekt-docs

            echo "🐳 Building and restarting docs containers..."
            docker compose up -d --build

            echo "🩺 Waiting for docs site on port 8088..."
            for i in {1..20}; do
              if curl -fsS http://127.0.0.1:8088 > /dev/null; then
                echo "✅ Docs site is responding"
                break
              fi

              echo "⏳ Docs site not ready yet... attempt $i/20"
              sleep 3

              if [ "$i" -eq 20 ]; then
                echo "❌ Docs site did not become ready"
                docker compose logs --tail=120
                exit 1
              fi
            done

            echo "🔁 Reloading Caddy..."
            systemctl reload caddy || true

            echo "✅ Deployment successful"
